version = 1
requires-python = ">=3.10"

[[package]]
name = "ai-disaster-relief-logistics"
version = "1.0.0"
source = { editable = "." }
dependencies = [
    { name = "fastapi" },
    { name = "uvicorn", extras = ["standard"] },
    { name = "pydantic" },
    { name = "openai" },
    { name = "requests" },
    { name = "pyyaml" },
    { name = "python-multipart" },
    { name = "httpx" },
    { name = "openenv-core" },
]

[[package]]
name = "fastapi"
version = "0.115.12"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "uvicorn"
version = "0.34.1"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "pydantic"
version = "2.11.3"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "openai"
version = "2.30.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "requests"
version = "2.32.5"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "pyyaml"
version = "6.0.2"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "python-multipart"
version = "0.0.20"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "httpx"
version = "0.28.1"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "openenv-core"
version = "0.2.0"
source = { registry = "https://pypi.org/simple" }
